# ObservationPoint — Permissions Source of Truth
#
# Edit this file to change role-based access. The /app/admin/permissions
# viewer reads from here and PERMISSIONS.md is generated from here, so
# the doc, the UI, and the runtime all stay in sync.
#
# Role title source-of-truth lives in `bigquery-dashboards/config.py`.
# Mirror those exact strings here. NEVER invent new role categories —
# if a title isn't here AND isn't already in the dashboards config, ask
# before adding it.
#
# Schema:
#   tiers:        ordered list of permission buckets, top → bottom = most → least access
#   capabilities: ordered list of permission grants; each lists which tiers get access
#                 and (optionally) the scope (all_schools | own_school | own_downline | self)
# ─────────────────────────────────────────────────────────────────────────────

tiers:
  - id: admin
    label: Admin
    description: |
      Broad FEATURE access (Network page, drill-downs, impersonation, the
      permissions matrix). But per-person DATA scope splits in two — this
      mirrors the Supervisor Dashboard model so the structure is repeatable:

        • HR function (CPO + everything in HR_TEAM_TITLES, which includes the
          CEO) → can open ANY staff member's record, PMAPs included. These
          are the only "see everyone" accounts. Helper: auth.is_hr_admin().

        • Other C-Team / ExDirs (CXO, CAO, COO, CSAO, ExDir of Teach and
          Learn, etc.) → see their recursive supervisor downline only, same
          as any supervisor. A Chief sees their own org branch — NOT a peer
          Chief's evaluation. (The CEO's downline is everyone, so she sees
          everything either way.)

      "Whose record can I open" = check_access(); "all-staff list" =
      get_accessible_emails(). Both key off is_hr_admin, not is_admin.
    rule: |
      FEATURE access: job_title matches C_TEAM_KEYWORDS (Chief, ExDir) OR
      is in HR_TEAM_TITLES.
      ALL-STAFF data access: job_title == 'Chief People Officer' OR in
      HR_TEAM_TITLES (is_hr_admin). Everyone else with this tier sees only
      their recursive downline.
    titles_keyword: [Chief, ExDir]
    titles_exact:
      - Chief Executive Officer
      - Chief HR Officer
      - Manager, HR
      - Manager Payroll
      - Manager - Benefits
      - Talent Operations Manager
      - Recruitment Manager

  - id: content_lead
    label: Content Lead
    description: |
      Formative coaching data across all 4 schools — observations, action steps,
      fundamentals, goals. Sees every staff profile, but personnel-review
      sections (PMAP, SR, PIP, Write-Up) are stripped for everyone except
      their own profile. Cannot file PMAP/PIP/Write-Up.
    note: |
      ExDir of Teach and Learn is NOT here — it matches C_TEAM_KEYWORDS via
      "ExDir" and gets the admin (feature) tier. The FLS-Schools directors
      below were added per Scott (May 2026) because they coach instruction /
      programs across schools, same shape as a content lead:
        - Dir of Teach Development  (Erica Winston)   — full content-lead scope
        - Dir of ESYNOLA            (Charlotte Steele) — SCOPED: sees only ESY-
          program staff (job_title contains "ESY") + her own recursive downline
          + self. See auth.ESY_SCOPED_CONTENT_LEAD_TITLES.
        - Dir of SPED               (Tiffany Willis)  — full content-lead scope
        - Dir of Stud Supp Serv     (Melissa Labarrere) — full content-lead scope
      Order matters: is_content_lead is checked BEFORE is_hr_admin /
      is_admin_title so these titles land here, not in a broader bucket.
    titles_exact:
      - K-8 Content Lead
      - Dir of Teach Development
      - Dir of ESYNOLA
      - Dir of SPED
      - Dir of Stud Supp Serv

  - id: school_leader
    label: School Leader
    description: |
      Building leadership. Sees Network-level trends and per-school comparisons,
      but can only drill INTO their own school's aggregate data (and the school
      deep-dive page). Individual staff profiles follow the recursive supervisor
      chain — same as the Supervisor Dashboard — NOT blanket "everyone at my
      building." If a teacher isn't reachable through the chain, the fix is the
      data (set supervisor_email), not a broader rule.

      Membership is NOT a hand-maintained title list — it's whatever the warehouse
      classifies as Leadership in staff_master_list_with_function's Job_Function
      CASE (grow-observations/staff_master_list_with_function.sql). Today that's
      Principal / Asst Principal / Dean of Students / School Director / Manager
      School Ops / SPED Coordinator / RTI Coordinator (plus anyone whose Function
      is 'Emp School Leaders' or 'Emp AP - Deans'). NOT Asst Dean (→ Support),
      NOT Dir of Culture (→ Network — it's a network Schools-Team role).
    rule: job_function == 'Leadership' (from staff_master_list_with_function) AND school is a real school

  - id: supervisor
    label: Supervisor
    description: |
      Anyone with at least one direct report. Sees their recursive downline.
      Not school-scoped — a network-team supervisor sees their reports
      regardless of school.
    rule: at least one row in staff where supervisor_email = user.email AND is_active

  - id: self_only
    label: Self-only
    description: |
      Active staff with no direct reports and no admin/content-lead/school-leader
      title. Sees their own profile, action steps, self-reflections, etc.
    rule: active staff who don't match any tier above

# ─────────────────────────────────────────────────────────────────────────────

capabilities:
  # ── Network-level views ──
  - id: view_network
    label: View Network landing page
    grants:
      - { tier: admin,         scope: all_schools }
      - { tier: content_lead,  scope: all_schools }
      - { tier: school_leader, scope: all_schools, note: "comparison numbers visible; click-through restricted by other capabilities" }

  - id: view_observations
    label: Drill-down · Observations
    grants:
      - { tier: admin,         scope: all_schools }
      - { tier: content_lead,  scope: all_schools }
      - { tier: school_leader, scope: own_school }

  - id: view_evaluations
    label: Drill-down · Evaluations (PMAP + SR)
    grants:
      - { tier: admin,         scope: all_schools }
      - { tier: school_leader, scope: own_school }
    excluded_explicitly: [content_lead]

  - id: view_action_steps
    label: Drill-down · Action Steps
    grants:
      - { tier: admin,         scope: all_schools }
      - { tier: content_lead,  scope: all_schools }
      - { tier: school_leader, scope: own_school }

  - id: view_fundamentals
    label: Drill-down · Fundamentals
    grants:
      - { tier: admin,         scope: all_schools }
      - { tier: content_lead,  scope: all_schools }
      - { tier: school_leader, scope: own_school }

  - id: view_celebration
    label: Drill-down · Celebration
    grants:
      - { tier: admin,         scope: all_schools }
      - { tier: content_lead,  scope: all_schools }
      - { tier: school_leader, scope: own_school }

  - id: view_school_page
    label: School deep-dive page
    grants:
      - { tier: admin,         scope: all_schools }
      - { tier: content_lead,  scope: all_schools }
      - { tier: school_leader, scope: own_school }

  # ── Team / individual profile ──
  - id: view_team
    label: Team page (direct reports)
    grants:
      - { tier: admin,         scope: all_schools }
      - { tier: school_leader, scope: own_downline }
      - { tier: supervisor,    scope: own_downline }

  - id: view_staff_profile
    label: Individual staff profile
    grants:
      - { tier: admin,         scope: all_schools }
      - { tier: content_lead,  scope: all_schools, note: "personnel-review sections (PMAP / PIP / Write-Up) hidden" }
      - { tier: school_leader, scope: own_downline, note: "recursive supervisor chain only — same as Supervisor Dashboard; not blanket 'everyone at my school'" }
      - { tier: supervisor,    scope: own_downline }
      - { tier: self_only,     scope: self }

  # ── TouchPoint forms (formative) ──
  - id: form_observe
    label: Observe form
    grants:
      - { tier: admin,         scope: all_schools }
      - { tier: content_lead,  scope: all_schools }
      - { tier: school_leader, scope: own_school }
      - { tier: supervisor,    scope: own_downline }

  - id: form_quick_feedback
    label: Quick Feedback form
    grants:
      - { tier: admin,         scope: all_schools }
      - { tier: content_lead,  scope: all_schools }
      - { tier: school_leader, scope: own_school }
      - { tier: supervisor,    scope: own_downline }

  - id: form_celebrate
    label: Celebrate form
    grants:
      - { tier: admin,         scope: all_schools }
      - { tier: content_lead,  scope: all_schools }
      - { tier: school_leader, scope: own_school }
      - { tier: supervisor,    scope: own_downline }

  - id: form_fundamentals
    label: Fundamentals timer form
    grants:
      - { tier: admin,         scope: all_schools }
      - { tier: content_lead,  scope: all_schools }
      - { tier: school_leader, scope: own_school }
      - { tier: supervisor,    scope: own_downline }

  - id: form_meeting
    label: Meeting form
    grants:
      - { tier: admin,         scope: all_schools }
      - { tier: content_lead,  scope: all_schools }
      - { tier: school_leader, scope: own_school }
      - { tier: supervisor,    scope: own_downline }

  - id: form_goals
    label: Goals form
    grants:
      - { tier: admin,         scope: all_schools }
      - { tier: content_lead,  scope: all_schools }
      - { tier: school_leader, scope: own_school }
      - { tier: supervisor,    scope: own_downline }
      - { tier: self_only,     scope: self }

  - id: form_solicit_feedback
    label: Solicit Feedback form
    grants:
      - { tier: admin,         scope: all_schools }
      - { tier: school_leader, scope: own_school }
      - { tier: supervisor,    scope: own_downline }
      - { tier: self_only,     scope: self }

  # ── TouchPoint forms (personnel review) ──
  - id: form_pmap
    label: PMAP form
    grants:
      - { tier: admin,         scope: all_schools }
      - { tier: school_leader, scope: own_school }
      - { tier: supervisor,    scope: own_downline }
    excluded_explicitly: [content_lead]

  - id: form_self_reflection
    label: Self-Reflection form
    note: |
      SR is universally self-only — every staff member fills in their own,
      no one fills SR about another person. The form auto-routes to the
      correct variant (Teacher / Leader / Network / Support / PreK) based
      on the user's job_function.
    grants:
      - { tier: admin,         scope: self }
      - { tier: content_lead,  scope: self }
      - { tier: school_leader, scope: self }
      - { tier: supervisor,    scope: self }
      - { tier: self_only,     scope: self }

  - id: form_pip
    label: PIP (Performance Improvement Plan)
    grants:
      - { tier: admin,         scope: all_schools }
      - { tier: school_leader, scope: own_school }
      - { tier: supervisor,    scope: own_downline }
    excluded_explicitly: [content_lead]

  - id: form_writeup
    label: Write-Up
    grants:
      - { tier: admin,         scope: all_schools }
      - { tier: school_leader, scope: own_school }
      - { tier: supervisor,    scope: own_downline }
    excluded_explicitly: [content_lead]

  # ── Admin ──
  - id: impersonate
    label: View-as / Impersonation
    grants:
      - { tier: admin, scope: all_schools }

  - id: view_permissions_admin
    label: Admin · Permissions matrix
    grants:
      - { tier: admin, scope: all_schools }
