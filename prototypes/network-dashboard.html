<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Network Dashboard — ObservationPoint</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f5f7fa;color:#111827;-webkit-font-smoothing:antialiased}
.nav{position:sticky;top:0;z-index:100;background:#002f60;padding:14px 16px;display:flex;align-items:center;gap:12px}
.nav-back{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;cursor:pointer}
.nav-title{font-size:15px;font-weight:700;color:#fff;flex:1}.nav-title span{color:#e47727}
.nav-year{font-size:12px;font-weight:600;color:rgba(255,255,255,.6)}

.content{padding:16px;max-width:1200px;margin:0 auto;padding-bottom:40px}

/* KPI Stats */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.kpi{background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.06);text-align:center}
.kpi-val{font-size:28px;font-weight:800;letter-spacing:-.02em}
.kpi-label{font-size:11px;color:#9ca3af;text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
.kpi-sub{font-size:11px;color:#6b7280;margin-top:4px}
.kpi-val.blue{color:#2563eb}.kpi-val.green{color:#059669}.kpi-val.orange{color:#e47727}.kpi-val.red{color:#dc2626}

.section-label{font-size:13px;font-weight:700;color:#374151;margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.section-label .badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;background:#e5e7eb;color:#6b7280}

/* Heatmap */
.heatmap-card{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);padding:16px;margin-bottom:16px;overflow-x:auto}
.heatmap{width:100%;border-collapse:collapse}
.heatmap th{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#9ca3af;padding:8px 6px;text-align:center;border-bottom:1px solid #e5e7eb}
.heatmap th:first-child{text-align:left;padding-left:12px}
.heatmap td{padding:8px 6px;text-align:center;border-bottom:1px solid #f3f4f6}
.heatmap td:first-child{text-align:left;padding-left:12px;font-size:13px;font-weight:600;color:#374151}
.heatmap tr:last-child td{border-bottom:none}
.hm-cell{display:inline-flex;align-items:center;justify-content:center;width:40px;height:32px;border-radius:6px;font-size:13px;font-weight:700;font-variant-numeric:tabular-nums}
.hm-1{background:#fee2e2;color:#b91c1c}.hm-2{background:#ffedd5;color:#c2410c}
.hm-3{background:#fef3c7;color:#a16207}.hm-4{background:#dcfce7;color:#059669}
.hm-5{background:#bbf7d0;color:#047857}
.hm-avg{font-size:12px;font-weight:600;color:#6b7280}

/* School cards */
.school-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;margin-bottom:16px}
.school-card{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);padding:16px}
.school-name{font-size:14px;font-weight:700;color:#002f60;margin-bottom:2px}
.school-meta{font-size:11px;color:#9ca3af;margin-bottom:12px}
.school-scores{display:flex;gap:4px;margin-bottom:10px}
.school-dim{flex:1;text-align:center;padding:6px 2px;border-radius:6px}
.school-dim-code{font-size:10px;font-weight:600;color:#9ca3af}
.school-dim-val{font-size:16px;font-weight:800;margin-top:2px}
.school-coverage{display:flex;align-items:center;gap:8px;margin-top:10px}
.cov-bar-bg{flex:1;height:6px;background:#f3f4f6;border-radius:3px;overflow:hidden}
.cov-bar{height:100%;border-radius:3px}
.cov-label{font-size:11px;color:#6b7280;white-space:nowrap}
.cov-pct{font-size:12px;font-weight:700;min-width:32px;text-align:right}
.school-trend{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:11px;color:#6b7280}
.trend-chip{font-weight:700}
.trend-chip.up{color:#059669}.trend-chip.down{color:#dc2626}.trend-chip.flat{color:#6b7280}

/* Trend chart (CSS bars) */
.trend-card{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);padding:16px;margin-bottom:16px}
.trend-title{font-size:14px;font-weight:700;margin-bottom:12px}
.trend-grid{display:grid;grid-template-columns:40px repeat(3,1fr);gap:4px;align-items:end}
.trend-year{font-size:10px;font-weight:600;color:#9ca3af;text-align:center;padding-top:4px}
.trend-dim-label{font-size:12px;font-weight:700;color:#374151;display:flex;align-items:flex-end;height:100%}
.trend-bar-wrap{display:flex;flex-direction:column;align-items:center;gap:2px}
.trend-bar{width:100%;border-radius:4px 4px 0 0;min-height:4px;transition:height .3s}
.trend-val{font-size:10px;font-weight:700;color:#6b7280}

/* Distribution */
.dist-card{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);padding:16px;margin-bottom:16px}
.dist-row{display:flex;align-items:center;gap:8px;padding:6px 0}
.dist-dim{font-size:12px;font-weight:700;color:#374151;width:28px}
.dist-bars{flex:1;display:flex;gap:2px;height:24px;align-items:flex-end}
.dist-seg{border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;min-width:16px;transition:flex .3s}
.d1{background:#ef4444}.d2{background:#f97316}.d3{background:#eab308}.d4{background:#22c55e}.d5{background:#059669}

/* Attention */
.attn-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px}
.attn-card{background:#fff;border-radius:10px;padding:12px;box-shadow:0 1px 3px rgba(0,0,0,.04);border-left:3px solid #dc2626}
.attn-school{font-size:13px;font-weight:600}
.attn-count{font-size:24px;font-weight:800;color:#dc2626}
.attn-label{font-size:10px;color:#9ca3af;text-transform:uppercase}

@media(max-width:640px){
    .kpi-grid{grid-template-columns:repeat(2,1fr)}
    .school-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<nav class="nav">
    <div class="nav-back" onclick="location.href='index.html'"><svg width="18" height="18" fill="none" stroke="white" stroke-width="2"><path d="M15 9H3m0 0l5-5M3 9l5 5"/></svg></div>
    <div class="nav-title">Observation<span>Point</span></div>
    <div class="nav-year">Network Dashboard</div>
</nav>

<div class="content" id="app" style="display:none">

<!-- KPIs -->
<div class="kpi-grid" id="kpis"></div>

<!-- Dimension Heatmap -->
<div class="section-label">School Comparison — PMAP Scores <span class="badge">2025-26</span></div>
<div class="heatmap-card"><table class="heatmap" id="heatmap"></table></div>

<!-- School Cards -->
<div class="section-label">School Detail</div>
<div class="school-grid" id="schoolCards"></div>

<!-- Year-over-Year Trends -->
<div class="section-label">Network Trend — PMAP Averages</div>
<div class="trend-card">
    <div class="trend-title">T1-T5 Average by Year</div>
    <div class="trend-grid" id="trendGrid"></div>
</div>

<!-- Score Distribution -->
<div class="section-label">Score Distribution <span class="badge">2025-26 PMAPs</span></div>
<div class="dist-card" id="distCard"></div>

<!-- Needs Attention -->
<div class="section-label">Needs Attention <span class="badge">No observation in 30+ days</span></div>
<div class="attn-grid" id="attnGrid"></div>

</div>

<div id="loading" style="padding:60px 16px;text-align:center;color:#9ca3af;font-size:13px">Loading dashboard...</div>

<script>
const DIMS = ['T1','T2','T3','T4','T5'];
const DIM_NAMES = {T1:'On Task',T2:'Community',T3:'Content',T4:'Cog. Engage',T5:'Demo of Learning'};
const SHORT_SCHOOLS = s => s.replace(' Charter School','').replace(' Community School','').replace(' Academy','');

function hmClass(v){ const r=Math.round(v); return 'hm-'+Math.max(1,Math.min(5,r)); }
function scoreColor(v){
    const colors = {1:'#ef4444',2:'#f97316',3:'#eab308',4:'#22c55e',5:'#059669'};
    return colors[Math.max(1,Math.min(5,Math.round(v)))] || '#9ca3af';
}
function covColor(pct){ return pct>=80?'#22c55e':pct>=50?'#eab308':'#dc2626'; }

function render(d){
    const k = d.network_kpis;
    const pmapPct = k.total_teachers ? Math.round(k.pmap_teachers/k.total_teachers*100) : 0;

    document.getElementById('kpis').innerHTML = `
        <div class="kpi"><div class="kpi-val blue">${k.observations_this_year}</div><div class="kpi-label">Observations</div><div class="kpi-sub">2025-26</div></div>
        <div class="kpi"><div class="kpi-val green">${k.teachers_observed}</div><div class="kpi-label">Teachers Observed</div><div class="kpi-sub">This year</div></div>
        <div class="kpi"><div class="kpi-val ${pmapPct>=80?'green':pmapPct>=50?'orange':'red'}">${pmapPct}%</div><div class="kpi-label">PMAP Coverage</div><div class="kpi-sub">${k.pmap_teachers} of ${k.total_teachers}</div></div>
        <div class="kpi"><div class="kpi-val orange">${Object.values(d.needs_attention_by_school).reduce((a,b)=>a+b,0)}</div><div class="kpi-label">Need Attention</div><div class="kpi-sub">30+ days no obs</div></div>
    `;

    // Heatmap
    const schools = Object.keys(d.schools).sort();
    let hm = '<thead><tr><th>School</th>';
    DIMS.forEach(dim => hm += `<th>${dim}</th>`);
    hm += '<th>Avg</th></tr></thead><tbody>';
    schools.forEach(school => {
        const sc = d.schools[school].scores;
        hm += `<tr><td>${SHORT_SCHOOLS(school)}</td>`;
        let vals = [];
        DIMS.forEach(dim => {
            const v = sc[dim];
            if(v != null){ vals.push(v); hm += `<td><span class="hm-cell ${hmClass(v)}">${v.toFixed(1)}</span></td>`; }
            else hm += '<td><span class="hm-cell" style="background:#f5f7fa;color:#d1d5db">—</span></td>';
        });
        const avg = vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length) : null;
        hm += `<td><span class="hm-avg">${avg?avg.toFixed(2):'—'}</span></td></tr>`;
    });
    // Network row
    hm += '<tr style="border-top:2px solid #e5e7eb"><td style="font-weight:800;color:#002f60">Network</td>';
    let netVals=[];
    DIMS.forEach(dim => {
        const v = d.network_avg[dim];
        if(v!=null){ netVals.push(v); hm += `<td><span class="hm-cell ${hmClass(v)}">${v.toFixed(1)}</span></td>`; }
        else hm += '<td>—</td>';
    });
    const netAvg = netVals.length ? netVals.reduce((a,b)=>a+b,0)/netVals.length : null;
    hm += `<td><span class="hm-avg" style="font-weight:800">${netAvg?netAvg.toFixed(2):'—'}</span></td></tr>`;
    hm += '</tbody>';
    document.getElementById('heatmap').innerHTML = hm;

    // School cards
    let cards = '';
    schools.forEach(school => {
        const s = d.schools[school];
        const sc = s.scores;
        const cov = s.coverage_pct || 0;
        const trend = s.trends || {};
        const yrs = Object.keys(trend).sort();
        let trendHtml = '';
        if(yrs.length >= 2){
            const prev = trend[yrs[yrs.length-2]];
            const cur = trend[yrs[yrs.length-1]];
            const delta = cur - prev;
            const arrow = delta>=0.1?'up':delta<=-0.1?'down':'flat';
            const sym = delta>=0.1?'▲':delta<=-0.1?'▼':'→';
            trendHtml = `<div class="school-trend">YoY: <span class="trend-chip ${arrow}">${sym} ${delta>=0?'+':''}${delta.toFixed(2)}</span></div>`;
        }
        cards += `<div class="school-card">
            <div class="school-name">${SHORT_SCHOOLS(school)}</div>
            <div class="school-meta">${s.teacher_count} teachers with PMAPs</div>
            <div class="school-scores">`;
        DIMS.forEach(dim => {
            const v = sc[dim];
            const col = v ? scoreColor(v) : '#d1d5db';
            cards += `<div class="school-dim" style="background:${col}11">
                <div class="school-dim-code">${dim}</div>
                <div class="school-dim-val" style="color:${col}">${v?v.toFixed(1):'—'}</div>
            </div>`;
        });
        cards += `</div>
            <div class="school-coverage">
                <div class="cov-label">Obs coverage</div>
                <div class="cov-bar-bg"><div class="cov-bar" style="width:${cov}%;background:${covColor(cov)}"></div></div>
                <div class="cov-pct" style="color:${covColor(cov)}">${cov}%</div>
            </div>
            ${trendHtml}
        </div>`;
    });
    document.getElementById('schoolCards').innerHTML = cards;

    // Trend grid
    const years = d.school_years;
    let tg = '';
    // Header row
    tg += '<div></div>';
    years.forEach(y => tg += `<div class="trend-year">${y.slice(2,4)}–${y.slice(7,9)}</div>`);
    DIMS.forEach(dim => {
        tg += `<div class="trend-dim-label">${dim}</div>`;
        years.forEach(yr => {
            const v = (d.network_trends[yr]||{})[dim];
            const h = v ? Math.round((v/5)*80) : 0;
            const col = v ? scoreColor(v) : '#e5e7eb';
            tg += `<div class="trend-bar-wrap"><div class="trend-val">${v?v.toFixed(1):'—'}</div><div class="trend-bar" style="height:${h}px;background:${col}"></div></div>`;
        });
    });
    document.getElementById('trendGrid').innerHTML = tg;

    // Distribution
    const dist = d.distribution;
    let dh = '';
    DIMS.forEach(dim => {
        const dd = dist[dim] || {};
        const total = Object.values(dd).reduce((a,b)=>a+b,0);
        dh += `<div class="dist-row"><div class="dist-dim">${dim}</div><div class="dist-bars">`;
        for(let s=1;s<=5;s++){
            const c = dd[String(s)] || 0;
            const pct = total ? (c/total*100) : 0;
            if(c > 0) dh += `<div class="dist-seg d${s}" style="flex:${pct}" title="${c} teachers at ${s}">${c}</div>`;
        }
        dh += '</div></div>';
    });
    document.getElementById('distCard').innerHTML = dh;

    // Needs attention
    const attn = d.needs_attention_by_school;
    let ah = '';
    Object.keys(attn).sort((a,b)=>attn[b]-attn[a]).forEach(school => {
        ah += `<div class="attn-card"><div class="attn-school">${SHORT_SCHOOLS(school)}</div><div class="attn-count">${attn[school]}</div><div class="attn-label">teachers 30+ days</div></div>`;
    });
    document.getElementById('attnGrid').innerHTML = ah;
}

async function load(){
    try {
        const r = await fetch('network_dashboard_data.json');
        const d = await r.json();
        render(d);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('app').style.display = '';
    } catch(e){
        console.error(e);
        document.getElementById('loading').textContent = 'Failed to load dashboard';
    }
}
load();
</script>
</body>
</html>
