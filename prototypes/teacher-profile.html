<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Teacher Profile — ObservationPoint</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f5f7fa;color:#111827;-webkit-font-smoothing:antialiased}
.nav{position:sticky;top:0;z-index:100;background:#002f60;padding:14px 16px;display:flex;align-items:center;gap:12px}
.nav-back{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;cursor:pointer}
.nav-title{font-size:15px;font-weight:700;color:#fff;flex:1}.nav-title span{color:#e47727}

/* Profile header */
.profile-header{background:#fff;padding:20px 16px;border-bottom:1px solid #e5e7eb}
.profile-top{display:flex;align-items:center;gap:14px}
.profile-av{width:56px;height:56px;border-radius:14px;background:#002f60;color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;flex-shrink:0}
.profile-name{font-size:20px;font-weight:800;letter-spacing:-.02em}
.profile-meta{font-size:13px;color:#6b7280;margin-top:2px}
.profile-actions{display:flex;gap:8px;margin-top:14px}
.profile-action{flex:1;padding:10px;border-radius:10px;border:1.5px solid #e5e7eb;background:#fff;text-align:center;font-size:12px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;color:#6b7280;transition:all .15s;text-decoration:none;display:block}
.profile-action:active{transform:scale(.97);border-color:#e47727;color:#e47727}

/* Stats row */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 16px}
.stat{background:#fff;border-radius:10px;padding:10px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.stat-val{font-size:22px;font-weight:800;letter-spacing:-.02em}
.stat-label{font-size:10px;color:#9ca3af;text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
.stat-val.green{color:#059669}.stat-val.orange{color:#e47727}.stat-val.red{color:#dc2626}.stat-val.blue{color:#2563eb}
.stat-val.muted{color:#9ca3af}

/* Section heading */
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#9ca3af;margin:16px 16px 8px}

/* Year-over-year grid */
.yoy-wrap{padding:0 16px 4px}
.yoy-card{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);padding:14px;overflow-x:auto}
.yoy-title{font-size:14px;font-weight:700;margin-bottom:2px}
.yoy-sub{font-size:12px;color:#9ca3af;margin-bottom:12px}
.yoy-table{width:100%;border-collapse:collapse;font-size:13px}
.yoy-table th{text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#9ca3af;padding:6px 4px;border-bottom:1px solid #e5e7eb}
.yoy-table th.dim-col{text-align:left;padding-left:8px}
.yoy-table td{padding:8px 4px;text-align:center;border-bottom:1px solid #f3f4f6}
.yoy-table td.dim-label{text-align:left;padding-left:8px;font-weight:700;color:#374151;font-size:12px}
.yoy-table tr:last-child td{border-bottom:none}
.yoy-score{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;font-size:13px;font-weight:700;font-variant-numeric:tabular-nums}
.yoy-score.empty{background:#f5f7fa;color:#d1d5db;font-size:11px}
.yoy-score.s1{background:#fee2e2;color:#b91c1c}
.yoy-score.s2{background:#ffedd5;color:#c2410c}
.yoy-score.s3{background:#fef3c7;color:#a16207}
.yoy-score.s4{background:#dcfce7;color:#059669}
.yoy-score.s5{background:#bbf7d0;color:#047857}
.yoy-delta{font-size:10px;font-weight:700;margin-left:2px;vertical-align:top}
.yoy-delta.up{color:#059669}
.yoy-delta.down{color:#dc2626}

/* Current scores */
.trend-section{padding:0 16px}
.trend-card{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);padding:16px}
.trend-title{font-size:14px;font-weight:700;margin-bottom:2px}
.trend-sub{font-size:11px;color:#9ca3af;margin-bottom:10px}
.trend-row{display:flex;align-items:center;gap:8px;padding:6px 0}
.trend-dim{font-size:12px;font-weight:700;color:#374151;width:34px}
.trend-bar-bg{flex:1;height:8px;background:#f3f4f6;border-radius:4px;overflow:hidden;position:relative}
.trend-bar{height:100%;border-radius:4px;transition:width .5s}
.trend-score{font-size:13px;font-weight:700;width:28px;text-align:right}

/* Timeline */
.content{padding:0 16px 40px}
.timeline-filters{display:flex;gap:6px;padding:0 16px 8px;flex-wrap:wrap}
.tl-filter{padding:6px 10px;border-radius:8px;background:#fff;border:1.5px solid #e5e7eb;font-size:11px;font-weight:600;color:#6b7280;cursor:pointer;font-family:'Inter',sans-serif}
.tl-filter.active{background:#002f60;color:#fff;border-color:#002f60}
.timeline-item{display:flex;gap:12px;margin-bottom:12px}
.tl-line{display:flex;flex-direction:column;align-items:center;width:16px;flex-shrink:0;padding-top:14px}
.tl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.tl-connector{width:2px;flex:1;background:#e5e7eb;margin-top:4px}
.tl-card{background:#fff;border-radius:10px;padding:12px;box-shadow:0 1px 3px rgba(0,0,0,.04);flex:1;cursor:pointer;transition:all .15s}
.tl-card:active{transform:scale(.99);box-shadow:0 2px 8px rgba(0,0,0,.08)}
.tl-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;gap:8px}
.tl-type{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;flex-shrink:0}
.tl-date{font-size:11px;color:#9ca3af;flex-shrink:0}
.tl-title{font-size:13px;font-weight:600;line-height:1.3}
.tl-rubric{font-size:11px;color:#9ca3af;margin-top:2px}
.tl-scores{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.tl-score{padding:3px 6px;border-radius:4px;font-size:11px;font-weight:700;background:#f5f7fa;color:#6b7280}
.tl-score.s1{background:#fee2e2;color:#b91c1c}.tl-score.s2{background:#ffedd5;color:#c2410c}
.tl-score.s3{background:#fef3c7;color:#a16207}.tl-score.s4{background:#dcfce7;color:#059669}
.tl-score.s5{background:#bbf7d0;color:#047857}

.year-divider{display:flex;align-items:center;gap:10px;margin:18px 0 10px;color:#9ca3af;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.year-divider::before,.year-divider::after{content:"";flex:1;height:1px;background:#e5e7eb}

.dot-obs{background:#2563eb}.dot-meet{background:#16a34a}.dot-fb{background:#ca8a04}
.dot-pmap{background:#059669}.dot-sr{background:#7c3aed}.dot-fund{background:#0891b2}
.type-obs{background:#dbeafe;color:#2563eb}.type-fund{background:#cffafe;color:#0891b2}
.type-pmap{background:#dcfce7;color:#059669}.type-sr{background:#ede9fe;color:#7c3aed}
.type-prek{background:#fce7f3;color:#be185d}

.loading{padding:60px 16px;text-align:center;color:#9ca3af;font-size:13px}
.empty{padding:40px 16px;text-align:center;color:#9ca3af;font-size:13px;background:#fff;border-radius:12px;margin:8px 16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.divider{height:1px;background:#e5e7eb;margin:12px 16px}
</style>
</head>
<body>

<nav class="nav">
    <div class="nav-back" onclick="history.back()"><svg width="18" height="18" fill="none" stroke="white" stroke-width="2"><path d="M15 9H3m0 0l5-5M3 9l5 5"/></svg></div>
    <div class="nav-title">Observation<span>Point</span></div>
</nav>

<div id="loading" class="loading">Loading teacher history…</div>

<div id="app" style="display:none">

<!-- Profile Header -->
<div class="profile-header">
    <div class="profile-top">
        <div class="profile-av" id="avatar">—</div>
        <div>
            <div class="profile-name" id="pName">—</div>
            <div class="profile-meta" id="pMeta">—</div>
        </div>
    </div>
    <div class="profile-actions">
        <div class="profile-action" onclick="location.href='teacher-observation.html'">Observe</div>
        <div class="profile-action" onclick="location.href='quick-feedback.html'">Feedback</div>
        <div class="profile-action" onclick="location.href='celebrate.html'">Celebrate</div>
        <div class="profile-action" onclick="location.href='meeting-data.html'">Meeting</div>
    </div>
</div>

<!-- Stats -->
<div class="stats">
    <div class="stat"><div class="stat-val blue" id="sTouchpoints">—</div><div class="stat-label">TouchPoints</div></div>
    <div class="stat"><div class="stat-val green" id="sLastPmap">—</div><div class="stat-label">Last PMAP Avg</div></div>
    <div class="stat"><div class="stat-val orange" id="sDaysSince">—</div><div class="stat-label">Days Since Obs</div></div>
    <div class="stat"><div class="stat-val muted" id="sYears">—</div><div class="stat-label">PMAP Years</div></div>
</div>

<!-- Year-over-year PMAP Grid -->
<div class="section-label">Year-Over-Year PMAP Scores</div>
<div class="yoy-wrap">
    <div class="yoy-card">
        <div class="yoy-title">PMAP Ratings by Year</div>
        <div class="yoy-sub" id="yoySub">—</div>
        <table class="yoy-table" id="yoyTable"></table>
    </div>
</div>

<!-- Current Scores (from latest PMAP) -->
<div class="section-label">Latest PMAP Rubric Scores</div>
<div class="trend-section">
    <div class="trend-card">
        <div class="trend-title" id="trendTitle">Latest PMAP</div>
        <div class="trend-sub" id="trendSub">—</div>
        <div id="trendRows"></div>
    </div>
</div>

<!-- Timeline -->
<div class="section-label">TouchPoint Timeline</div>
<div class="timeline-filters" id="tlFilters"></div>
<div class="content" id="timeline"></div>

</div><!-- /app -->

<script>
const params = new URLSearchParams(location.search);
const TEACHER_EMAIL = (params.get('teacher') || '').toLowerCase();
const DATA_URLS = ['/api/teacher_history', 'teacher_history.json', 'teacher_history_demo.json'];

const DIM_ORDER = {
    teacher: ['T1','T2','T3','T4','T5'],
    leader: ['L1','L2','L3','L4','L5'],
    prek: ['PK1','PK2','PK3','PK4','PK5','PK6','PK7','PK8','PK9','PK10']
};

const FORM_META = {
    observation_teacher: {label:'Observation', dot:'dot-obs', type:'type-obs', title:'Classroom Observation'},
    observation_prek:    {label:'PreK Obs',    dot:'dot-obs', type:'type-prek',title:'PreK Observation'},
    observation_fundamentals:{label:'Fundamentals',dot:'dot-fund',type:'type-fund',title:'Fundamentals'},
    pmap_teacher:        {label:'PMAP',        dot:'dot-pmap',type:'type-pmap',title:'Performance Map — Teacher'},
    pmap_leader:         {label:'PMAP',        dot:'dot-pmap',type:'type-pmap',title:'Performance Map — Leader'},
    pmap_prek:           {label:'PMAP',        dot:'dot-pmap',type:'type-pmap',title:'Performance Map — PreK'},
    pmap_support:        {label:'PMAP',        dot:'dot-pmap',type:'type-pmap',title:'Performance Map — Support'},
    pmap_network:        {label:'PMAP',        dot:'dot-pmap',type:'type-pmap',title:'Performance Map — Network'},
    self_reflection_teacher:{label:'Self-Ref', dot:'dot-sr',  type:'type-sr',  title:'Teacher Self-Reflection'},
    self_reflection_leader: {label:'Self-Ref', dot:'dot-sr',  type:'type-sr',  title:'Leader Self-Reflection'},
    self_reflection_prek:   {label:'Self-Ref', dot:'dot-sr',  type:'type-sr',  title:'PreK Self-Reflection'},
    self_reflection_support:{label:'Self-Ref', dot:'dot-sr',  type:'type-sr',  title:'Support Self-Reflection'},
    self_reflection_network:{label:'Self-Ref', dot:'dot-sr',  type:'type-sr',  title:'Network Self-Reflection'},
};

function initials(name){
    if(!name) return '—';
    const parts = name.trim().split(/\s+/);
    return (parts[0][0] + (parts[1]?parts[1][0]:'')).toUpperCase();
}

function scoreClass(s){
    if(s == null) return 'empty';
    const r = Math.round(s);
    return 's' + Math.max(1, Math.min(5, r));
}

function daysBetween(d1, d2){
    const ms = (new Date(d2)) - (new Date(d1));
    return Math.floor(ms / (1000*60*60*24));
}

function prettyDate(iso){
    if(!iso) return '';
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
}

function detectDimSet(teacher){
    for(const tp of teacher.touchpoints){
        for(const k of Object.keys(tp.scores || {})){
            if(k.startsWith('T')) return 'teacher';
            if(k.startsWith('L')) return 'leader';
            if(k.startsWith('PK')) return 'prek';
        }
    }
    return 'teacher';
}

function render(teacher, allYears){
    // Header
    document.getElementById('avatar').textContent = initials(teacher.name);
    document.getElementById('pName').textContent = teacher.name || teacher.email;
    const metaBits = [];
    if(teacher.school) metaBits.push(teacher.school);
    const pmapYrs = Object.keys(teacher.pmap_by_year || {}).sort();
    if(pmapYrs.length) metaBits.push(`${pmapYrs.length} year${pmapYrs.length>1?'s':''} of PMAP history`);
    document.getElementById('pMeta').textContent = metaBits.join(' · ');

    // Stats
    document.getElementById('sTouchpoints').textContent = teacher.touchpoint_count;

    const latestYr = pmapYrs[pmapYrs.length-1];
    if(latestYr){
        const dims = teacher.pmap_by_year[latestYr];
        const vals = Object.values(dims);
        const avg = vals.length ? (vals.reduce((a,b)=>a+b,0) / vals.length) : null;
        document.getElementById('sLastPmap').textContent = avg ? avg.toFixed(1) : '—';
    } else {
        document.getElementById('sLastPmap').textContent = '—';
    }

    if(teacher.last_observation_date){
        const days = daysBetween(teacher.last_observation_date, new Date().toISOString().slice(0,10));
        document.getElementById('sDaysSince').textContent = days;
    } else {
        document.getElementById('sDaysSince').textContent = '—';
    }
    document.getElementById('sYears').textContent = pmapYrs.length;

    // Dimension set (teacher / leader / prek)
    const dimSet = detectDimSet(teacher);
    const dims = DIM_ORDER[dimSet];

    // Year-over-year grid
    const yoySub = document.getElementById('yoySub');
    const yoyTable = document.getElementById('yoyTable');
    if(pmapYrs.length === 0){
        yoySub.textContent = 'No PMAP history on record';
        yoyTable.innerHTML = '';
    } else {
        yoySub.textContent = `${pmapYrs.length} year${pmapYrs.length>1?'s':''} of PMAP scores, most recent on the right`;
        let thead = '<thead><tr><th class="dim-col">Dim</th>';
        for(const yr of pmapYrs){
            thead += `<th>${yr.slice(2,4)}–${yr.slice(7,9)}</th>`;
        }
        thead += '</tr></thead>';
        let tbody = '<tbody>';
        for(const code of dims){
            tbody += `<tr><td class="dim-label">${code}</td>`;
            let prev = null;
            for(const yr of pmapYrs){
                const s = teacher.pmap_by_year[yr][code];
                if(s == null){
                    tbody += '<td><span class="yoy-score empty">—</span></td>';
                    prev = null;
                } else {
                    let delta = '';
                    if(prev != null){
                        const d = s - prev;
                        if(d >= 0.5) delta = '<span class="yoy-delta up">▲</span>';
                        else if(d <= -0.5) delta = '<span class="yoy-delta down">▼</span>';
                    }
                    const rounded = Math.round(s);
                    tbody += `<td><span class="yoy-score ${scoreClass(s)}">${rounded}</span>${delta}</td>`;
                    prev = s;
                }
            }
            tbody += '</tr>';
        }
        tbody += '</tbody>';
        yoyTable.innerHTML = thead + tbody;
    }

    // Latest PMAP bars
    const trendRows = document.getElementById('trendRows');
    const trendSub = document.getElementById('trendSub');
    if(latestYr){
        trendSub.textContent = `From ${latestYr} PMAP`;
        const d = teacher.pmap_by_year[latestYr];
        let html = '';
        for(const code of dims){
            const s = d[code];
            if(s == null){
                html += `<div class="trend-row"><div class="trend-dim">${code}</div><div class="trend-bar-bg"></div><div class="trend-score" style="color:#d1d5db">—</div></div>`;
                continue;
            }
            const pct = (s / 5) * 100;
            const colorMap = {1:'#ef4444',2:'#f97316',3:'#eab308',4:'#22c55e',5:'#059669'};
            const col = colorMap[Math.round(s)] || '#9ca3af';
            html += `<div class="trend-row">
                <div class="trend-dim">${code}</div>
                <div class="trend-bar-bg"><div class="trend-bar" style="width:${pct}%;background:${col}"></div></div>
                <div class="trend-score" style="color:${col}">${Math.round(s)}</div>
            </div>`;
        }
        trendRows.innerHTML = html;
    } else {
        trendSub.textContent = 'No PMAP on record';
        trendRows.innerHTML = '';
    }

    // Timeline filters
    const tlFilters = document.getElementById('tlFilters');
    const filters = [
        {key:'all', label:'All'},
        {key:'pmap', label:'PMAPs'},
        {key:'observation', label:'Observations'},
        {key:'self_reflection', label:'Self-Reflections'},
        {key:'fundamentals', label:'Fundamentals'},
    ];
    let filterHtml = '';
    for(const f of filters){
        filterHtml += `<div class="tl-filter ${f.key==='all'?'active':''}" data-filter="${f.key}">${f.label}</div>`;
    }
    tlFilters.innerHTML = filterHtml;
    tlFilters.querySelectorAll('.tl-filter').forEach(el => {
        el.onclick = () => {
            tlFilters.querySelectorAll('.tl-filter').forEach(e => e.classList.remove('active'));
            el.classList.add('active');
            renderTimeline(teacher, el.dataset.filter, dims);
        };
    });
    renderTimeline(teacher, 'all', dims);
}

function matchesFilter(formType, filter){
    if(filter === 'all') return true;
    if(filter === 'pmap') return formType.startsWith('pmap_');
    if(filter === 'observation') return formType === 'observation_teacher' || formType === 'observation_prek';
    if(filter === 'self_reflection') return formType.startsWith('self_reflection_');
    if(filter === 'fundamentals') return formType === 'observation_fundamentals';
    return true;
}

function renderTimeline(teacher, filter, dims){
    const container = document.getElementById('timeline');
    const filtered = teacher.touchpoints.filter(tp => matchesFilter(tp.form_type, filter));
    if(!filtered.length){
        container.innerHTML = '<div class="empty">No touchpoints match this filter</div>';
        return;
    }

    let html = '';
    let currentYear = null;
    filtered.forEach((tp, i) => {
        if(tp.school_year !== currentYear){
            html += `<div class="year-divider">${tp.school_year}</div>`;
            currentYear = tp.school_year;
        }
        const meta = FORM_META[tp.form_type] || {label:tp.form_type, dot:'dot-obs', type:'type-obs', title:tp.form_type};
        let scoresHtml = '';
        const tpDims = Object.keys(tp.scores || {});
        if(tpDims.length){
            scoresHtml = '<div class="tl-scores">';
            if(tp.form_type === 'observation_fundamentals'){
                const vals = Object.values(tp.scores).filter(v => v != null);
                if(vals.length){
                    const avg = vals.reduce((a,b)=>a+b,0) / vals.length;
                    scoresHtml += `<div class="tl-score ${scoreClass(avg)}">Avg: ${Math.round(avg)}</div>`;
                }
            } else {
                const orderedDims = dims.filter(d => tp.scores[d] != null);
                for(const code of orderedDims){
                    scoresHtml += `<div class="tl-score ${scoreClass(tp.scores[code])}">${code}: ${Math.round(tp.scores[code])}</div>`;
                }
                const extras = tpDims.filter(d => !dims.includes(d));
                for(const code of extras){
                    scoresHtml += `<div class="tl-score ${scoreClass(tp.scores[code])}">${code}: ${Math.round(tp.scores[code])}</div>`;
                }
            }
            scoresHtml += '</div>';
        }
        const last = i === filtered.length - 1;
        html += `
        <div class="timeline-item">
            <div class="tl-line">
                <div class="tl-dot ${meta.dot}"></div>
                ${last ? '' : '<div class="tl-connector"></div>'}
            </div>
            <div class="tl-card">
                <div class="tl-top">
                    <div class="tl-type ${meta.type}">${meta.label}</div>
                    <div class="tl-date">${prettyDate(tp.date)}</div>
                </div>
                <div class="tl-title">${meta.title}</div>
                <div class="tl-rubric">${tp.rubric || ''}</div>
                ${scoresHtml}
            </div>
        </div>`;
    });
    container.innerHTML = html;
}

async function load(){
    let data = null;
    for(const url of DATA_URLS){
        try {
            const r = await fetch(url);
            if(r.ok){ data = await r.json(); break; }
        } catch(e){}
    }
    if(!data){
        document.getElementById('loading').textContent = 'Failed to load teacher history';
        return;
    }
    const emails = Object.keys(data.teachers);
    const email = TEACHER_EMAIL || emails[0] || '';
    const teacher = data.teachers[email];
    if(!teacher){
        const available = emails.slice(0,20).map(e => {
            const t = data.teachers[e];
            return `<a href="?teacher=${e}" style="color:#e47727">${t.name}</a>`;
        }).join(' · ');
        document.getElementById('loading').innerHTML =
            `<div>No data for <b>${email}</b></div>
             <div style="margin-top:12px;font-size:12px;line-height:1.8">Try: ${available}</div>`;
        return;
    }
    render(teacher, data.school_years);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
}
load();
</script>

</body>
</html>
