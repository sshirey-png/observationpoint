<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ObservationPoint — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f5f7fa;display:flex;align-items:center;justify-content:center;min-height:100vh;-webkit-font-smoothing:antialiased}
.card{background:#fff;border-radius:20px;padding:48px 36px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.08);max-width:380px;width:100%;margin:20px}
.logo-text{font-size:28px;font-weight:800;color:#002f60;letter-spacing:-.03em;margin-bottom:4px}
.logo-text span{color:#e47727}
.subtitle{font-size:14px;color:#6b7280;margin-bottom:6px}
.org{font-size:13px;color:#9ca3af;margin-bottom:32px}
.google-btn{
display:flex;align-items:center;justify-content:center;gap:10px;
width:100%;padding:14px 20px;border-radius:12px;
background:#002f60;color:#fff;font-size:15px;font-weight:600;
border:none;cursor:pointer;font-family:'Inter',sans-serif;
transition:all .2s;
}
.google-btn:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,47,96,0.25)}
.google-btn svg{flex-shrink:0}
.footer{margin-top:24px;font-size:11px;color:#9ca3af}
</style>
</head>
<body>
<div class="card">
    <div class="logo-text">Observation<span>Point</span></div>
    <div class="subtitle">Classroom Observation & Coaching</div>
    <div class="org">{{ config.org_name }}</div>
    <a href="/auth/google" style="text-decoration:none">
        <button class="google-btn">
            <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#fff" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" opacity=".8"/><path fill="#fff" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" opacity=".6"/><path fill="#fff" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" opacity=".4"/></svg>
            Sign in with Google
        </button>
    </a>
    <div class="footer">Secure authentication via Google Workspace</div>
</div>
</body>
</html>
