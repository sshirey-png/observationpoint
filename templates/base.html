<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="{{ config.secondary_color }}">
<title>{% block title %}ObservationPoint{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
    --pri:{{ config.primary_color }};
    --pri-l:{{ config.primary_color }}15;
    --pri-g:{{ config.primary_color }}35;
    --navy:{{ config.secondary_color }};
    --navy-l:{{ config.secondary_color }}0a;
    --bg:#f5f7fa;--surf:#ffffff;--bdr:#e5e7eb;
    --txt:#111827;--txt2:#6b7280;--txt3:#9ca3af;
    --dark-bg:#0f1623;--dark-surf:#1a2332;--dark-bdr:#2a3a4e;
    --dark-txt:#e8ecf1;--dark-txt2:#8899aa;--dark-txt3:#556677;
    --suc:#059669;--suc-bg:#dcfce7;
    --warn:#ca8a04;--warn-bg:#fef9c3;
    --err:#dc2626;--err-bg:#fee2e2;
    --info:#2563eb;--info-bg:#dbeafe;
    --R:16px;--Rs:12px;--Rx:8px;
    --sh:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
    --sh-md:0 4px 12px rgba(0,0,0,0.08);
}
body{
    font-family:'Inter',-apple-system,sans-serif;
    background:var(--bg);color:var(--txt);
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
    min-height:100vh;overflow-x:hidden;
}
/* Anti-flicker */
.scr{display:none;animation:fadeUp .3s ease-out}
.scr.on{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Light nav */
.nav-l{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--navy);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(0,47,96,0.15)}
.nav-l .logo{font-size:16px;font-weight:700;color:#fff}
.nav-l .logo span{color:var(--pri)}
.nav-l .back{width:34px;height:34px;border-radius:8px;background:rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer}
.nav-l .back:active{background:rgba(255,255,255,0.2)}
.nav-l .act{font-size:14px;font-weight:600;color:#fff;cursor:pointer;padding:6px 12px;border-radius:6px}

/* Dark nav */
.nav-d{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(15,22,35,0.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--dark-bdr);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.nav-d .logo{font-size:15px;font-weight:600;color:var(--dark-txt)}
.nav-d .logo span{color:var(--pri)}
.nav-d .back{width:34px;height:34px;border-radius:8px;background:var(--dark-surf);border:1px solid var(--dark-bdr);display:flex;align-items:center;justify-content:center;color:var(--dark-txt2);cursor:pointer}
.nav-d .act{font-size:13px;font-weight:600;color:var(--pri);cursor:pointer;padding:6px 12px;border-radius:6px}

/* Padding */
.pad-l{padding:64px 16px 100px;background:var(--bg);min-height:100vh}
.pad-d{padding:64px 16px 100px;background:var(--dark-bg);min-height:100vh;color:var(--dark-txt)}

/* Bottom bar */
.bbar{position:fixed;bottom:0;left:0;right:0;padding:10px 16px;padding-bottom:max(10px,env(safe-area-inset-bottom));z-index:100;display:flex;gap:8px}
.bbar-l{background:#fff;border-top:1px solid var(--bdr);box-shadow:0 -2px 10px rgba(0,0,0,.04)}
.bbar-d{background:rgba(15,22,35,.9);backdrop-filter:blur(20px);border-top:1px solid var(--dark-bdr)}
.bb{flex:1;padding:15px;border-radius:var(--Rs);font-size:14px;font-weight:600;text-align:center;cursor:pointer;font-family:'Inter',sans-serif;border:none;transition:all .2s}
.bb:active{transform:scale(.97)}
.bb-pri{background:var(--pri);color:#fff}
.bb-out{background:transparent;color:var(--txt);border:1.5px solid var(--bdr)}

/* Common */
.label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--txt3);margin-bottom:8px}
.divider{height:1px;background:var(--bdr);margin:20px 0}
.chip{display:inline-flex;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.ai-pill{background:var(--pri);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.06em}

/* SVG helper */
.arrow-left{width:18px;height:18px}

/* Transitions */
a,button,input,select,textarea,.card{transition:all .2s cubic-bezier(.4,0,.2,1)}

/* Custom scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}

/* Print */
@media print{.nav-l,.nav-d,.bbar{display:none}.pad-l,.pad-d{padding:20px}}
</style>
{% block head %}{% endblock %}
</head>
<body>
{% block body %}{% endblock %}
<script>
// Global navigation
function go(id){
    document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
    document.getElementById(id).classList.add('on');
    window.scrollTo(0,0);
}
// Global user
const USER = {{ user | tojson }};
const CONFIG = {{ config | tojson }};
const SCHOOLS = {{ schools | tojson }};
const SCHOOL_YEAR = '{{ school_year }}';
</script>
{% block scripts %}{% endblock %}
</body>
</html>
